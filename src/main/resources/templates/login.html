<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #4a6cf7; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { background: white; padding: 35px; border-radius: 8px; width: 100%; max-width: 380px; }
        h1 { text-align: center; margin-bottom: 25px; font-size: 22px; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #4a6cf7; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        .error { background: #fee; color: #c00; padding: 10px; border-radius: 4px; margin-bottom: 12px; display: none; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #4a6cf7; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Đăng Nhập</h1>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Đăng nhập</button>
        </form>
        <div class="link">Chưa có tài khoản? <a href="/register">Đăng ký</a></div>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) {
                saveAuth(data);
                window.location.href = '/dashboard';
            } else {
                document.getElementById('error').textContent = data.message;
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
