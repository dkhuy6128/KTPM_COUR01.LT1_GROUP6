<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .pomo-card { background: white; border-radius: 12px; padding: 30px; max-width: 600px; margin: 20px auto; text-align: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .timer-display { font-size: 90px; font-weight: bold; color: #3b82f6; margin: 20px 0; font-family: monospace; letter-spacing: -2px; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 10px; }
        .status-work { background: #fee2e2; color: #ef4444; }
        .status-break { background: #dcfce7; color: #22c55e; }
        .status-idle { background: #f1f5f9; color: #64748b; }
        .task-select { width: 80%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 15px; margin-bottom: 15px; background: white; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        .mini-pomo-window {
            position: fixed; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.95); color: white;
            padding: 12px 16px; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 9999; font-family: monospace; display: none; border-left: 4px solid #ef4444; min-width: 180px;
        }
        .mini-timer { font-size: 22px; font-weight: bold; color: #f43f5e; margin-top: 3px; }
    </style>
</head>
<body>

<div id="miniPomoWindow" class="mini-pomo-window">
    <div style="font-size: 11px; color: #94a3b8; font-weight: bold;">🎯 TASK HIỆN TẠI</div>
    <div id="miniTaskTitle" style="font-size: 13px; font-weight: bold; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Không rõ</div>
    <div id="miniTimerDisplay" class="mini-timer">30:00</div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="logo">📊 Task Manager</div>
        <div class="user-info">Xin chào, <span id="username">...</span></div>
        <ul class="menu">
            <li><a href="/dashboard">📊 Dashboard</a></li>
            <li><a href="/kanban">📋 Kanban Board</a></li>
            <li><a href="/calendar">📅 Calendar Pro</a></li>
            <li><a href="/pomodoro" class="active">⏱️ Pomodoro Timer</a></li>
        </ul>
        <button class="btn-logout" onclick="logout()">Đăng xuất</button>
    </div>

    <div class="main-content">
        <div class="pomo-card">
            <h2>Pomodoro Timer Pro</h2>
            
            <select id="pomoTaskSelect" class="task-select" onchange="saveSelectedTaskState()">
                <option value="">-- Chọn task sắp đến hạn để tập trung --</option>
            </select>
            
            <p id="targetTaskText" style="font-weight: bold; color: #475569; margin-top: 5px;">Chọn task rồi bấm Bắt đầu</p>

            <div class="timer-display" id="timerDisplay">30:00</div>

            <div>Trạng thái phiên: <span id="pomoStatus" class="status-badge status-idle">Sẵn sàng</span></div>

            <div class="btn-group">
                <button class="btn btn-green" id="startBtn" onclick="startTimer()">Bắt đầu</button>
                <button class="btn btn-orange" id="pauseBtn" onclick="pauseTimer()" style="display:none;">Tạm dừng</button>
                <button class="btn btn-red" onclick="resetTimer()">Reset</button>
            </div>
            
            <div style="margin-top: 15px; font-size: 12px; color: #64748b;">
                💡 Hệ thống tự động kích hoạt thông báo đẩy trình duyệt và còi báo khi hết giờ.
            </div>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script>
checkAuth();
const userId = getUserId();
document.getElementById('username').textContent = getUsername();

let pomoTasks = [];
let timerInterval = null;

let isWorkMode = localStorage.getItem('pomo_isWorkMode') !== 'false';
let isPaused = localStorage.getItem('pomo_isPaused') !== 'false';
let targetEndTime = parseInt(localStorage.getItem('pomo_targetEndTime')) || 0;
let savedTimeLeft = parseInt(localStorage.getItem('pomo_savedTimeLeft')) || (30 * 60);

if (Notification.permission !== "granted" && Notification.permission !== "denied") {
    Notification.requestPermission();
}

function playSystemAlarmSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); 
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        setTimeout(() => oscillator.stop(), 1200);
    } catch (e) { console.log("Không thể phát chuông âm thanh."); }
}

function sendWebNotification(title, message) {
    if (Notification.permission === "granted") {
        new Notification(title, { body: message, icon: '/favicon.ico' });
    }
}

async function loadPomoTasks() {
    try {
        pomoTasks = JSON.parse(localStorage.getItem('local_tasks_' + userId)) || [];
        const res = await api('/api/tasks/' + userId);
        if (res && res.ok) {
            pomoTasks = await res.json();
            localStorage.setItem('local_tasks_' + userId, JSON.stringify(pomoTasks));
        }
    } catch (e) {}
    populateTaskSelect();
    restoreTimerState();
}

function populateTaskSelect() {
    const select = document.getElementById('pomoTaskSelect');
    if (!select) return;
    let activeTasks = pomoTasks.filter(t => t.status !== 'COMPLETED');
    activeTasks.sort((a, b) => {
        if (!a.endTime) return 1;
        if (!b.endTime) return -1;
        return new Date(a.endTime).getTime() - new Date(b.endTime).getTime();
    });
    select.innerHTML = '<option value="">-- Chọn task sắp đến hạn để tập trung --</option>';
    activeTasks.forEach(t => {
        let deadlineStr = t.endTime ? ` (Hạn: ${new Date(t.endTime).getDate()}/${new Date(t.endTime).getMonth()+1})` : "";
        select.innerHTML += `<option value="${t.id}">🎯 ${t.title}${deadlineStr}</option>`;
    });
    const savedTaskId = localStorage.getItem('pomo_selectedTaskId');
    if (savedTaskId) select.value = savedTaskId;
}

function saveSelectedTaskState() {
    const select = document.getElementById('pomoTaskSelect');
    localStorage.setItem('pomo_selectedTaskId', select.value);
}

function updateUIDisplay(minutes, seconds) {
    const str = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    document.getElementById('timerDisplay').textContent = str;
    document.getElementById('miniTimerDisplay').textContent = str;
}

function checkTimerPulse() {
    if (isPaused) return;
    const distance = targetEndTime - Date.now();
    if (distance <= 0) {
        clearInterval(timerInterval);
        handlePhaseEnd();
    } else {
        const secondsLeft = Math.ceil(distance / 1000);
        updateUIDisplay(Math.floor(secondsLeft / 60), secondsLeft % 60);
    }
}

function startTimer() {
    const select = document.getElementById('pomoTaskSelect');
    if (isWorkMode && select.value === "") {
        alert("Chọn lấy 1 cái task sắp đến hạn để làm việc nhé bro!");
        return;
    }

    isPaused = false;
    localStorage.setItem('pomo_isPaused', 'false');
    localStorage.setItem('pomo_isRunning', 'true'); 
    
    targetEndTime = Date.now() + (savedTimeLeft * 1000);
    localStorage.setItem('pomo_targetEndTime', targetEndTime);

    setUIActiveState();
    clearInterval(timerInterval);
    timerInterval = setInterval(checkTimerPulse, 1000);
}

function setUIActiveState() {
    const select = document.getElementById('pomoTaskSelect');
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('pauseBtn').style.display = 'inline-block';
    document.getElementById('miniPomoWindow').style.display = 'block';
    
    const selectedText = select.selectedIndex >= 0 ? select.options[select.selectedIndex].text : "Đang tập trung";
    document.getElementById('miniTaskTitle').textContent = selectedText;

    if (isWorkMode) {
        document.getElementById('targetTaskText').textContent = `🔥 Đang làm: ${selectedText}`;
        document.getElementById('pomoStatus').className = "status-badge status-work";
        document.getElementById('pomoStatus').textContent = "Đang tập trung";
    } else {
        document.getElementById('targetTaskText').textContent = `☕ Nghỉ xả hơi chút nào bồ!`;
        document.getElementById('pomoStatus').className = "status-badge status-break";
        document.getElementById('pomoStatus').textContent = "Giải lao";
    }
}

function pauseTimer() {
    isPaused = true;
    localStorage.setItem('pomo_isPaused', 'true');
    clearInterval(timerInterval);
    
    const distance = targetEndTime - Date.now();
    savedTimeLeft = distance > 0 ? Math.ceil(distance / 1000) : 0;
    localStorage.setItem('pomo_savedTimeLeft', savedTimeLeft);

    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('pauseBtn').style.display = 'none';
    document.getElementById('pomoStatus').textContent = "Tạm dừng";
}

function resetTimer() {
    isPaused = true;
    isWorkMode = true;
    savedTimeLeft = 30 * 60;
    
    localStorage.setItem('pomo_isPaused', 'true');
    localStorage.setItem('pomo_isWorkMode', 'true');
    localStorage.setItem('pomo_isRunning', 'false');
    localStorage.setItem('pomo_savedTimeLeft', savedTimeLeft);
    localStorage.removeItem('pomo_targetEndTime');

    clearInterval(timerInterval);
    updateUIDisplay(30, 0);

    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('pauseBtn').style.display = 'none';
    document.getElementById('miniPomoWindow').style.display = 'none';
    document.getElementById('targetTaskText').textContent = "Chọn task rồi bấm Bắt đầu";
    document.getElementById('pomoStatus').className = "status-badge status-idle";
    document.getElementById('pomoStatus').textContent = "Sẵn sàng";
}

function handlePhaseEnd() {
    playSystemAlarmSound();
    if (isWorkMode) {
        sendWebNotification("Hết giờ làm việc! 🎉", "Bồ đã hoàn thành xuất sắc phiên tập trung. Nghỉ 5 phút nhé!");
        isWorkMode = false;
        savedTimeLeft = 5 * 60; 
    } else {
        sendWebNotification("Quay lại làm việc thôi! 🔥", "Hết giờ xả hơi rồi, chiến đấu tiếp nào bro!");
        isWorkMode = true;
        savedTimeLeft = 30 * 60;
    }
    localStorage.setItem('pomo_isWorkMode', isWorkMode);
    localStorage.setItem('pomo_savedTimeLeft', savedTimeLeft);
    localStorage.removeItem('pomo_targetEndTime');
    
    resetTimer();
}

function restoreTimerState() {
    const isRunningGlobally = localStorage.getItem('pomo_isRunning') === 'true';
    if (!isRunningGlobally) {
        resetTimer();
        return;
    }

    if (isPaused) {
        updateUIDisplay(Math.floor(savedTimeLeft / 60), savedTimeLeft % 60);
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('pauseBtn').style.display = 'none';
    } else {
        setUIActiveState();
        timerInterval = setInterval(checkTimerPulse, 1000);
    }
}

loadPomoTasks();
</script>
</body>
</html>
