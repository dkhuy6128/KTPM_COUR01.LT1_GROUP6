spring.application.name=personal-task-manager

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/personal_task_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1111}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.sql.init.mode=never
spring.thymeleaf.cache=false

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:mySecretKeyForTaskManagerProject2026KTPM}
jwt.expiration=86400000

logging.level.root=INFO

server.forward-headers-strategy=framework